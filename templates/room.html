{% extends 'base.html' %}

{% block content %}
<section class="room-shell">
  <aside class="room-sidebar">
    <button type="button" class="text-btn" id="open-room-modal">
      + Join or create another chat
    </button>

    <h2>Channels</h2>
    <div class="channel-list">
      {% for room in rooms %}
      <a
        href="{{ url_for('view_room', room_code=room) }}"
        class="channel-pill {% if room == code %}is-active{% endif %}"
      >
        {{ room }}
      </a>
      {% endfor %}
    </div>
  </aside>

  <div class="chat-panel">
    <header class="chat-header">
      <p class="eyebrow">Active room</p>
      <h1>{{ code }}</h1>
    </header>

    <div class="messages" id="messages" aria-live="polite"></div>

    <div class="inputs">
      <input
        type="text"
        placeholder="Write a message"
        name="message"
        id="message"
        autocomplete="off"
      />
      <button type="button" name="send" id="send-btn" class="btn btn-primary">
        Send
      </button>
    </div>
  </div>
</section>

<div class="room-modal-backdrop" id="room-modal" hidden>
  <div class="room-modal" role="dialog" aria-modal="true" aria-labelledby="room-modal-title">
    <div class="room-modal-header">
      <h2 id="room-modal-title">Join or Create a Channel</h2>
      <button type="button" class="modal-close-btn" id="close-room-modal" aria-label="Close">
        &times;
      </button>
    </div>
    <p class="support-text">
      Enter a room code to join an existing channel, or create a new one in one click.
    </p>

    <form action="{{ url_for('chatroom_entry') }}" method="post" class="stack-form">
      <label for="modal-room-code">Room code</label>
      <div class="row-input">
        <input
          type="text"
          id="modal-room-code"
          name="code"
          placeholder="e.g. project-alpha"
          autocomplete="off"
        />
        <button type="submit" name="join" class="btn btn-primary">Join Channel</button>
      </div>

      <button type="submit" name="create" class="btn btn-secondary btn-full">
        Create a New Channel
      </button>
    </form>
  </div>
</div>

<script src="{{ url_for('static', filename='room.js') }}"></script>

{% for msg in messages %}
<script type="text/javascript">
  createMessage({{ msg.name|tojson }}, {{ msg.message|tojson }});
</script>
{% endfor %}
{% endblock %}
