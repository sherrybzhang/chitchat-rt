{% extends 'base.html' %}

{% block content %}
<section class="page page-entry">
  <div class="card card-entry">
    <p class="chip">Room Selection</p>
    <h1>Join or Create a Channel</h1>
    <p class="support-text">
      Enter a room code to join an existing channel, or create a new one in one click.
    </p>

    <form action="{{ url_for('chatroom_entry') }}" method="post" class="stack-form">
      <label for="code">Room code</label>
      <div class="row-input">
        <input
          type="text"
          id="code"
          name="code"
          value="{{ code }}"
          placeholder="e.g. project-alpha"
          autocomplete="off"
        />
        <button type="submit" name="join" class="btn btn-primary">Join Channel</button>
      </div>

      <button type="submit" name="create" class="btn btn-secondary btn-full">
        Create a New Channel
      </button>

      {% if error %}
      <p class="form-error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
</section>
{% endblock %}
