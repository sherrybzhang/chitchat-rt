<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChitChat{% block title %}{% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg', v='5') }}" />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"
      integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA=="
      crossorigin="anonymous"
    ></script>

    {% block head %}{% endblock %}
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div class="app-shell">
      <a href="{{ url_for('index') }}" class="site-brand" aria-label="Go to ChitChat home">
        <img
          src="{{ url_for('static', filename='favicon.svg', v='5') }}"
          alt=""
          class="site-brand-mark"
        />
        <span class="site-brand-text">ChitChat</span>
      </a>
      <main id="main-content" class="content" tabindex="-1">
        {% block content %}{% endblock %}
      </main>
    </div>
    <script src="{{ url_for('static', filename='forms.js') }}"></script>
  </body>
</html>
