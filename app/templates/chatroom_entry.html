{% extends 'base.html' %}

{% block title %} | Enter a Channel{% endblock %}
{% block body_class %}auth-screen{% endblock %}

{% block content %}
<section class="page page-entry" aria-labelledby="channel-entry-title">
  <div class="card card-entry">
    <div class="card-header-row">
      <a href="{{ url_for('index') }}" class="card-brand" aria-label="Go to ChitChat home">
        <img
          src="{{ url_for('static', filename='favicon.svg', v='5') }}"
          alt=""
          class="card-brand-mark"
        />
        <span class="card-brand-text">ChitChat</span>
      </a>
    </div>
    <h1 id="channel-entry-title">Enter a Channel</h1>
    <p class="support-text">
      Enter a channel code. If it exists, you will join it. If not, we will create it.
    </p>

    <form action="{{ url_for('chatroom_entry') }}" method="post" class="stack-form" data-validate-form>
      <label for="code">Channel Code</label>
      <div class="row-input">
        <input
          type="text"
          id="code"
          name="code"
          value="{{ code }}"
          placeholder="e.g. project-alpha"
          autocomplete="off"
          required
          data-error-id="code-error"
          aria-required="true"
          autocapitalize="off"
          aria-describedby="code-error"
          {% if error %}aria-invalid="true"{% endif %}
        />
        <p class="form-error" id="code-error" role="alert" {% if not error %}hidden{% endif %}>
          {{ error|default('', true) }}
        </p>
        <button type="submit" class="btn btn-primary">Enter Channel</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
